<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>シンプル・シューティング（BGM & 画像版）</title>
<style>
    body {
        margin: 0;
        padding: 10px;
        background-color: #222;
        color: #fff;
        text-align: center;
        font-family: sans-serif;
        touch-action: none; 
        user-select: none;
    }
    #game-container {
        position: relative;
        display: inline-block;
        max-width: 100%;
    }
    canvas {
        background-color: #000;
        border: 3px solid #555;
        box-shadow: 0 0 20px rgba(255, 255, 255, 0.2);
        display: block;
        max-width: 100%;
        height: auto;
    }
    #btnRetry {
        position: absolute;
        top: 60%;
        left: 50%;
        transform: translate(-50%, -50%);
        padding: 15px 30px;
        font-size: 20px;
        font-weight: bold;
        background-color: #fff;
        color: #000;
        border: 4px solid #f44;
        border-radius: 10px;
        cursor: pointer;
        display: none;
        touch-action: manipulation;
    }
    #btnRetry:active { background-color: #ccc; }
    #info { margin-bottom: 10px; font-size: 14px; }
    #controls {
        display: flex;
        justify-content: space-between;
        align-items: center;
        width: 100%;
        max-width: 400px;
        margin: 15px auto 0;
    }
    #dpad {
        display: grid;
        grid-template-columns: 50px 50px 50px;
        grid-template-rows: 50px 50px 50px;
        gap: 5px;
    }
    .dir-btn {
        background-color: #444;
        color: white;
        border: 2px solid #777;
        border-radius: 10px;
        font-size: 24px;
        font-weight: bold;
        touch-action: manipulation;
    }
    .dir-btn:active { background-color: #666; }
    #btnUp { grid-column: 2; grid-row: 1; }
    #btnLeft { grid-column: 1; grid-row: 2; }
    #btnRight { grid-column: 3; grid-row: 2; }
    #btnDown { grid-column: 2; grid-row: 3; }
    .shoot-btn {
        width: 80px;
        height: 80px;
        background-color: #822;
        color: white;
        border: 3px solid #f44;
        border-radius: 50%;
        font-size: 18px;
        font-weight: bold;
        touch-action: manipulation;
    }
    .shoot-btn:active { background-color: #a44; }
</style>
</head>
<body>

<div id="info">ボタンをタップしてBGM開始！</div>

<div id="game-container">
    <canvas id="gameCanvas" width="400" height="500"></canvas>
    <button id="btnRetry">リトライ</button>
</div>

<div id="controls">
    <div id="dpad">
        <button id="btnUp" class="dir-btn">↑</button>
        <button id="btnLeft" class="dir-btn">←</button>
        <button id="btnRight" class="dir-btn">→</button>
        <button id="btnDown" class="dir-btn">↓</button>
    </div>
    <div id="action">
        <button id="btnShoot" class="shoot-btn">攻撃</button>
    </div>
</div>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");
const btnRetry = document.getElementById("btnRetry");

const keys = {};

// --- Step 1: 画像とBGMの読み込み ---
const playerImg = new Image();
playerImg.src = "player.png";

const enemyNormalImg = new Image();
enemyNormalImg.src = "normal.png";

const enemyBossImg = new Image();
enemyBossImg.src = "BOSS.jpg";

// BGM設定
const bgm = new Audio("BGM.mp3"); // ここに使用したいファイル名を指定
bgm.loop = true;                 // ループ再生
bgm.volume = 0.2;                // 音量調整（0.0〜1.0）
let isMusicStarted = false;

// BGM再生を開始する関数
function startBGM() {
    if (!isMusicStarted) {
        bgm.play().catch(() => {}); // エラー回避用
        isMusicStarted = true;
    }
}

// --- 操作設定 ---
document.addEventListener("keydown", (e) => {
    keys[e.code] = true;
    startBGM(); // キー操作でBGM開始
});
document.addEventListener("keyup", (e) => keys[e.code] = false);

function setupButton(buttonId, keyCode) {
    const btn = document.getElementById(buttonId);
    btn.addEventListener("pointerdown", (e) => { 
        e.preventDefault(); 
        keys[keyCode] = true; 
        startBGM(); // ボタンタップでBGM開始
    });
    btn.addEventListener("pointerup", (e) => { e.preventDefault(); keys[keyCode] = false; });
    btn.addEventListener("pointerleave", (e) => { e.preventDefault(); keys[keyCode] = false; });
}

setupButton("btnUp", "ArrowUp");
setupButton("btnDown", "ArrowDown");
setupButton("btnLeft", "ArrowLeft");
setupButton("btnRight", "ArrowRight");
setupButton("btnShoot", "Space");

// --- ゲーム変数 ---
let frameCount = 0;
let score = 0;
let state = "PLAYING"; 
let bossSpawned = false;
let bullets = [];
let enemies = [];

const player = {
    x: 185, y: 400, w: 30, h: 30, speed: 4, cooldown: 0,
    draw() {
        if (playerImg.complete) {
            ctx.drawImage(playerImg, this.x, this.y, this.w, this.h);
        } else {
            ctx.fillStyle = "#00FFFF";
            ctx.fillRect(this.x, this.y, this.w, this.h);
        }
    },
    update() {
        if (keys["ArrowLeft"] && this.x > 0) this.x -= this.speed;
        if (keys["ArrowRight"] && this.x + this.w < canvas.width) this.x += this.speed;
        if (keys["ArrowUp"] && this.y > 0) this.y -= this.speed;
        if (keys["ArrowDown"] && this.y + this.h < canvas.height) this.y += this.speed;

        if (this.cooldown > 0) this.cooldown--;
        if (keys["Space"] && this.cooldown === 0) {
            bullets.push(new Bullet(this.x + this.w / 2 - 3, this.y, 0, -8, "#FFFF00", false));
            this.cooldown = 10;
        }
    }
};

class Bullet {
    constructor(x, y, dx, dy, color, isEnemy) {
        this.x = x; this.y = y; this.w = 6; this.h = 15;
        this.dx = dx; this.dy = dy; this.color = color; this.isEnemy = isEnemy;
    }
    draw() {
        ctx.fillStyle = this.color;
        ctx.fillRect(this.x, this.y, this.w, this.h);
    }
    update() {
        this.x += this.dx;
        this.y += this.dy;
    }
}

class Enemy {
    constructor(x, y, w, h, hp, type) {
        this.x = x; this.y = y; this.w = w; this.h = h;
        this.maxHp = hp;
        this.hp = hp; 
        this.type = type;
        this.dx = type === "boss" ? 2 : 0;
        this.dy = type === "boss" ? 0 : Math.random() * 2 + 1;
        this.cooldown = 0;
    }
    draw() {
        let img = (this.type === "boss") ? enemyBossImg : enemyNormalImg;
        if (img.complete) {
            ctx.drawImage(img, this.x, this.y, this.w, this.h);
        } else {
            ctx.fillStyle = (this.type === "boss") ? "#FF00FF" : "#FF4444";
            ctx.fillRect(this.x, this.y, this.w, this.h);
        }
        
        if (this.type === "boss") {
            ctx.fillStyle = "red";
            ctx.fillRect(this.x, this.y - 15, this.w, 8);
            ctx.fillStyle = "#0F0";
            ctx.fillRect(this.x, this.y - 15, this.w * (this.hp / this.maxHp), 8);
        }
    }
    update() {
        this.x += this.dx;
        this.y += this.dy;

        if (this.type === "boss") {
            if (this.x <= 0 || this.x + this.w >= canvas.width) this.dx *= -1; 
            this.cooldown--;
            if (this.cooldown <= 0) {
                bullets.push(new Bullet(this.x + this.w / 2, this.y + this.h, 0, 5, "#FF88FF", true));
                bullets.push(new Bullet(this.x + this.w / 2, this.y + this.h, -2, 4, "#FF88FF", true));
                bullets.push(new Bullet(this.x + this.w / 2, this.y + this.h, 2, 4, "#FF88FF", true));
                this.cooldown = 50; 
            }
        }
    }
}

function checkCollision(rect1, rect2) {
    return (
        rect1.x < rect2.x + rect2.w &&
        rect1.x + rect1.w > rect2.x &&
        rect1.y < rect2.y + rect2.h &&
        rect1.y + rect1.h > rect2.y
    );
}

btnRetry.addEventListener("click", () => {
    frameCount = 0;
    score = 0;
    state = "PLAYING"; 
    bossSpawned = false;
    bullets = [];
    enemies = [];
    player.x = 185;
    player.y = 400;
    btnRetry.style.display = "none";
    
    // リトライ時にBGMを最初からかけ直すなら
    bgm.currentTime = 0;
    bgm.play();
    
    gameLoop();
});

function gameLoop() {
    if (state !== "PLAYING") {
        ctx.fillStyle = "rgba(0, 0, 0, 0.6)";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = "white";
        ctx.font = "bold 40px sans-serif";
        ctx.textAlign = "center";
        ctx.fillText(state === "CLEAR" ? "GAME CLEAR!" : "GAME OVER", canvas.width/2, 220);
        btnRetry.style.display = "block";
        
        // ゲームオーバー時にBGMを止めるなら
        // bgm.pause();
        
        return; 
    }

    ctx.clearRect(0, 0, canvas.width, canvas.height);
    frameCount++;

    if (frameCount < 1000) {
        if (frameCount % 40 === 0) {
            enemies.push(new Enemy(Math.random() * (canvas.width - 30), -30, 30, 30, 1, "normal"));
        }
    } else if (!bossSpawned) {
        enemies.push(new Enemy(150, 50, 100, 80, 100, "boss"));
        bossSpawned = true;
    }

    player.update();
    player.draw();

    for (let i = bullets.length - 1; i >= 0; i--) {
        let b = bullets[i];
        b.update(); b.draw();
        if (b.y < -20 || b.y > canvas.height + 20) bullets.splice(i, 1);
        if (b.isEnemy && checkCollision(b, player)) state = "GAMEOVER";
    }

    for (let i = enemies.length - 1; i >= 0; i--) {
        let e = enemies[i];
        e.update(); e.draw();
        if (e.y > canvas.height) enemies.splice(i, 1);
        if (checkCollision(e, player)) state = "GAMEOVER";

        for (let j = bullets.length - 1; j >= 0; j--) {
            let b = bullets[j];
            if (!b.isEnemy && checkCollision(b, e)) {
                e.hp--;
                bullets.splice(j, 1); 
                if (e.hp <= 0) {
                    if (e.type === "boss") state = "CLEAR";
                    score += (e.type === "boss" ? 1000 : 10);
                    enemies.splice(i, 1); 
                }
                break; 
            }
        }
    }

    ctx.fillStyle = "white";
    ctx.font = "20px sans-serif";
    ctx.textAlign = "left";
    ctx.fillText("SCORE: " + score, 10, 30);
    
    requestAnimationFrame(gameLoop);
}

gameLoop();
</script>
</body>
</html>
